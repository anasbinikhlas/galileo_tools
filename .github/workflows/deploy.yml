name: Build and Push

on:
  push:
    branches: [ "main" ]

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: 🛠️ Install and Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
          echo "--- Local build output (frontend/dist) ---"
          ls -la dist

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔒 Trust known host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: 📦 Deploy frontend dist to server
        run: |
          rsync -avz --delete \
            -e "ssh -p 65002" \
            ./frontend/dist/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u408469790/public_html/galileotools/frontend/dist/
          echo "--- Remote check (server dist folder) ---"
          ssh -p 65002 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "ls -la /home/u408469790/public_html/galileotools/frontend/dist/"

  deploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🔒 Trust known host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: 📦 Deploy backend to server
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='storage/' \
            --exclude='vendor/' \
            --exclude='public/storage' \
            --exclude='bootstrap/cache/' \
            --exclude='.git/' \
            --exclude='.github/' \
            -e "ssh -p 65002" \
            ./backend/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u408469790/public_html/galileotools/backend/

      - name: 🐘 Laravel post-deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            set -e
            cd /home/u408469790/public_html/galileotools/backend
            composer install --no-dev --optimize-autoloader
            php artisan config:clear
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
            chmod -R 775 storage bootstrap/cache