name: Build and Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: '20'

      # 2. Build React Frontend (Isolated to /frontend folder)
      - name: Build React Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 3. Move build output to backend/public folder
      - name: Move Build to Backend
        run: |
          cp -r ./frontend/dist/* ./backend/public/

      # 4. Deploy via FTP
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.omaanu.com
          username: u408469790.galileodeploy
          password: ${{ secrets.FTP_PASSWORD }}
          # Deploy only the backend folder
          local-dir: ./backend/
          server-dir: /home/u408469790/domains/omaanu.com/public_html/galileodeploy/
          exclude: |
            **/.git*
            **/.git*/**
            .env