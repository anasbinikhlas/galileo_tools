name: Build and Deploy to Hostinger

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build React Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Move Build to Backend
        run: |
          mkdir -p ./backend/public
          cp -r ./frontend/dist/* ./backend/public/

      - name: FTP Deploy (FTPS / Passive)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.omaanu.com
          username: u408469790.galileodeploy
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./backend/public/
          server-dir: /home/u408469790/domains/omaanu.com/public_html/galileodeploy/
          passive: true
          exclude: |
            **/.git*
            **/.git*/**
            .env